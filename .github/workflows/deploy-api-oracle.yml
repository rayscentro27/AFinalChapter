name: Deploy API to Oracle VM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'gateway/**'
      - 'deploy/oracle/**'
      - 'scripts/oracle_*.sh'
      - 'scripts/provision_smoke_user_token.mjs'
      - 'scripts/cleanup_smoke_users.mjs'
      - '.github/workflows/deploy-api-oracle.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OCI_PROFILE: goclearonline
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_API_KEY_CONTENT: ${{ secrets.OCI_API_KEY_CONTENT }}
      OCI_BASTION_ID: ${{ secrets.OCI_BASTION_ID }}
      OCI_INSTANCE_ID: ${{ secrets.OCI_INSTANCE_ID }}
      OCI_TARGET_IP: ${{ secrets.OCI_TARGET_IP }}
      SMOKE_TENANT_ID: ${{ secrets.SMOKE_TENANT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APP_BASE_URL: https://app.goclearonline.cc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCI CLI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install oci-cli

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(OCI_REGION OCI_USER_OCID OCI_TENANCY_OCID OCI_FINGERPRINT OCI_API_KEY_CONTENT SMOKE_TENANT_ID SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY)
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Build OCI config
        shell: bash
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_API_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config <<EOF
          [$OCI_PROFILE]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Install root dependencies for smoke tooling
        shell: bash
        run: |
          npm install

      - name: Deploy gateway over OCI Bastion
        shell: bash
        run: |
          bash scripts/oracle_bastion_deploy.sh

      - name: Protected production smoke
        shell: bash
        run: |
          bash scripts/oracle_protected_smoke.sh "$SMOKE_TENANT_ID"
