name: Deploy API to Oracle VM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'gateway/**'
      - 'deploy/oracle/**'
      - '.github/workflows/deploy-api-oracle.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
      ORACLE_USER: ${{ secrets.ORACLE_USER }}
      ORACLE_SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
      ORACLE_APP_DIR: ${{ secrets.ORACLE_APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate deploy secrets
        shell: bash
        run: |
          missing=0
          for name in ORACLE_HOST ORACLE_USER ORACLE_SSH_PRIVATE_KEY ORACLE_APP_DIR; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ORACLE_SSH_PRIVATE_KEY" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H "$ORACLE_HOST" >> ~/.ssh/known_hosts

      - name: Rsync project
        shell: bash
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/oracle_key" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.env.local' \
            ./ "$ORACLE_USER@$ORACLE_HOST:$ORACLE_APP_DIR"

      - name: Install and restart API
        shell: bash
        run: |
          ssh -i ~/.ssh/oracle_key "$ORACLE_USER@$ORACLE_HOST" <<SSH
            set -euo pipefail
            cd "$ORACLE_APP_DIR/gateway"
            npm ci --omit=dev
            sudo systemctl restart nexus-api
            sudo systemctl status nexus-api --no-pager
          SSH
