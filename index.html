
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Nexus | AI Financial OS</title>
    <meta name="description" content="The complete AI Operating System for business funding.">
    <meta name="theme-color" content="#0B0C10">
    
    <!-- PWA Settings for iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://lucide.dev/favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
        --nexus-emerald: #059669;
        --nexus-cyan: #66FCF1;
        --nexus-obsidian: #0B0C10;
        --nexus-slate: #1F2833;
      }
      html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; height: 100%; }
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--nexus-obsidian); 
        overscroll-behavior-y: none; 
        height: 100%; 
        overflow: hidden; 
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
        color: #f8fafc;
      }
      #root { height: 100%; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Visual Texture & Cinematic Overlays */
      .neural-grain {
        position: absolute;
        inset: 0;
        opacity: 0.03;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .video-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 0%, rgba(2, 6, 23, 0.4) 50%, rgba(2, 6, 23, 1) 100%);
        pointer-events: none;
      }

      /* Advanced Animations */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      @keyframes spatial-slide {
        0% { transform: perspective(1200px) rotateX(10deg) translateY(20px) scale(0.95); opacity: 0; filter: blur(10px); }
        100% { transform: perspective(1200px) rotateX(0deg) translateY(0) scale(1); opacity: 1; filter: blur(0); }
      }
      .animate-spatial { animation: spatial-slide 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      @keyframes laser {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .animate-laser-scan {
        position: absolute;
        width: 100%;
        height: 4px;
        background: linear-gradient(to right, transparent, var(--nexus-cyan), transparent);
        box-shadow: 0 0 20px var(--nexus-cyan);
        z-index: 10;
        animation: laser 3.5s infinite ease-in-out;
      }

      @keyframes border-flow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .border-animated {
        background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(102, 252, 241, 0.2), rgba(255,255,255,0.05));
        background-size: 200% 200%;
        animation: border-flow 6s linear infinite;
      }

      .holographic-edge { 
        position: relative; 
        border: 1px solid rgba(102, 252, 241, 0.1);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .holographic-edge:hover {
        border-color: rgba(102, 252, 241, 0.4);
        box-shadow: 0 10px 40px -10px rgba(102, 252, 241, 0.2);
        transform: translateY(-4px);
      }

      @keyframes neural-pulse {
        0% { transform: scale(1); box-shadow: 0 0 0px 0px rgba(102, 252, 241, 0.4); }
        50% { transform: scale(1.01); box-shadow: 0 0 25px 8px rgba(102, 252, 241, 0.15); }
        100% { transform: scale(1); box-shadow: 0 0 0px 0px rgba(102, 252, 241, 0.4); }
      }
      .animate-ai-glow { animation: neural-pulse 4s infinite ease-in-out; }

      @keyframes red-glow-pulse {
        0% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
        50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); border-color: #ef4444; }
        100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
      }
      .animate-critical-glow { animation: red-glow-pulse 2s infinite ease-in-out; }

      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(1deg); }
      }
      .animate-float { animation: float 6s infinite ease-in-out; }

      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",

    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4",
    "vite": "https://esm.sh/vite@^7.3.0",

  }
}
</script>
</head>
  <body>
    <div id="root" class="relative z-10"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
